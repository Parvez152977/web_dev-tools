<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Footer (Basic)</title>
        <style>
            .site-footer {
    background-color: #c8dcdd;
    padding: 2rem 1rem;
    text-align: center;
    margin: 0;
}

.footer-branding {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 1rem;
}

.footer-logo img {
    height: 50px;
    width: auto;
}

.footer-description p {
    max-width: 25rem;
    font-size: 1rem;
    color: #333;
    margin: auto;
}

.footer-social {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin:1rem;
}

.footer-social img {
    height: 30px;
    width: auto;
}

.footer-separator {
    border: none;
    border-top: 1px solid #2c343b;
    margin: 1rem 0;
}

.footer-bottom {
    font-size: 0.9rem;
    color: #6c757d;
}

        </style>
	</head>
	<body>
		<footer class="site-footer">
            <div class="footer-content">
                <div class="footer-branding">
                    <div class="footer-logo">
                        <img src="Images/logo.png" alt="Hero Travel Logo">
            
                    </div>
                    <div class="site-title">
                        <h2>Hero <span class="title-highlight">Travel</span></h2>
                    </div>
                </div>
                <div class="footer-description">
                    <p>Adventure awaits. Discover curated trips, exclusive deals, and insider tips from travelers who've been there.
                        Start your
                        journey today and create memories that last a lifetime.</p>
                </div>
                <div class="footer-social">
                    <div><a href=""><img src="Images/facebook.jpeg" alt="Facebook"></a></div>
                    <div><a href=""><img src="Images/twitter.jpeg" alt="Twitter"></a></div>
                    <div><a href=""><img src="Images/instagram.jpeg" alt="Instagram"></a></div>
                    <div><a href=""><img src="Images/linkedin.png" alt="LinkedIn"></a></div>
                </div>
            </div>
            <hr class="footer-separator">
            <div class="footer-bottom">
                <p class="copyright">&copy; 2026 Hero Travel</p>
                </div>
		</footer>
	</body>
</html>
