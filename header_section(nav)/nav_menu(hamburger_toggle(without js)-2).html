<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hero Travel</title>
    <meta name="description" content="Hero Travel - Explore the world">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.5;
            color: #333;
            background: #fff;
        }

        #header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 48px;
            background: #fff;
            box-shadow: 0 2px 4px rgba(0, 0, 0, .1);
        }

        .branding {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        #title-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #007bff;
        }

        .logo img {
            height: 50px;
            width: auto;
        }

        .site-title {
            font-size: 1.8rem;
            color: #007bff;
        }

        /* Navigation */
        .nav {
            position: relative;
        }

        /* Hide the checkbox */
        #menu-toggle {
            display: none;
        }

        /* Hamburger icon */
        .hamburger {
            display: inline-block;
            cursor: pointer;
            padding: 5px;
        }

        .bar1,
        .bar2,
        .bar3 {
            width: 35px;
            height: 5px;
            background-color: #333;
            margin: 6px 0;
            transition: 0.4s;
        }

        /* Animated hamburger when checked */
        #menu-toggle:checked~.hamburger .bar1 {
            transform: rotate(-45deg) translate(-9px, 6px);
        }

        #menu-toggle:checked~.hamburger .bar2 {
            opacity: 0;
        }

        #menu-toggle:checked~.hamburger .bar3 {
            transform: rotate(45deg) translate(-8px, -8px);
        }

        /* Menu - hidden by default */
        #Menu {
            position: absolute;
            top: 100%;
            right: 0;
            width: 250px;
            background-color: rgb(217, 231, 255);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px 30px;
            display: none;
            z-index: 1000;
            border-radius: 8px;
            margin-top: 10px;
        }

        /* Show menu when checkbox is checked */
        #menu-toggle:checked~#Menu {
            display: block;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        #Menu h2 {
            margin: 10px 0;
        }

        #Menu a {
            text-decoration: none;
            color: #333;
            display: block;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            transition: 0.3s;
            font-size: 1.1rem;
        }

            #Menu a:hover {
            color: #007bff;
            padding-left: 10px;
        }

        #Menu h2:last-child a {
            border-bottom: none;
        }

        /* Hero section */
        #hero {
            padding: 80px 48px;
            text-align: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        #hero h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #333;
        }

        #hero p {
            font-size: 1.2rem;
            color: #555;
            max-width: 600px;
            margin: 0 auto;
        }

        footer {
            text-align: center;
            padding: 30px;
            background: #f5f5f5;
            margin-top: 40px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            #header-container {
                padding: 16px 24px;
            }

            #hero {
                padding: 40px 24px;
            }

            #hero h2 {
                font-size: 1.8rem;
            }

            .site-title {
                font-size: 1.4rem;
            }

            .logo img {
                height: 40px;
            }

            #Menu {
                width: 200px;
                right: -10px;
            }
        }
    </style>
</head>

<body>
    <header id="site-header" class="site-header">
        <div id="header-container" class="header-container">
            <div class="branding">
                <div class="logo">
                    <img src="Images/logo.png" alt="Hero Travel Logo">
                </div>
                <div id="title-name">
                    <h1 class="site-title">Hero Travel</h1>
                </div>
            </div>

            <div class="nav">
                <!-- Hidden checkbox to control menu -->
                <input type="checkbox" id="menu-toggle">

                <!-- Hamburger icon (label for checkbox) -->
                <label for="menu-toggle" class="hamburger">
                    <div class="bar1"></div>
                    <div class="bar2"></div>
                    <div class="bar3"></div>
                </label>

                <!-- Menu items -->
                <div id="Menu">
                    <h2><a href="#home">Home</a></h2>
                    <h2><a href="#packages">Packages</a></h2>
                    <h2><a href="#testimonial">Testimonial</a></h2>
                    <h2><a href="#blog">Blog</a></h2>
                    <h2><a href="#contact">Contact</a></h2>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section id="hero">
            <h2>Explore. Dream. Discover.</h2>
            <p>Welcome to Hero Travel — your gateway to unforgettable journeys.</p>
        </section>

        <section id="about">
            <h2>About Us</h2>
            <p>Learn more about Hero Travel and our commitment to providing exceptional travel experiences.</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Hero Travel</p>
    </footer>
</body>

</html>
